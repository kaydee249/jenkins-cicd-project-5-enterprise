<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f3d5c">Project 5 Architecture: Automated, Gated CI/CD to Kubernetes</text>

  <!-- ===== SOURCE region ===== -->
  <rect x="20" y="120" width="170" height="290" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="105" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">SOURCE</text>

  <rect x="40" y="160" width="130" height="58" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">Developer</text>
  <text x="105" y="203" text-anchor="middle" font-size="10.5" fill="#475569">writes code</text>

  <rect x="40" y="300" width="130" height="58" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="105" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">GitHub repo</text>
  <text x="105" y="343" text-anchor="middle" font-size="10" fill="#475569">code + Jenkinsfile</text>

  <line x1="105" y1="218" x2="105" y2="298" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="113" y="262" font-size="10" fill="#475569">git push</text>

  <!-- ===== BUILD SERVER region ===== -->
  <rect x="235" y="80" width="420" height="470" rx="10" fill="#f6f9fb" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="445" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">BUILD SERVER (EC2)</text>

  <!-- Jenkins -->
  <rect x="255" y="120" width="380" height="236" rx="8" fill="#ffffff" stroke="#15577d" stroke-width="2"/>
  <rect x="255" y="120" width="380" height="34" rx="8" fill="#15577d"/>
  <rect x="255" y="140" width="380" height="14" fill="#15577d"/>
  <text x="445" y="142" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Jenkins  ·  pipeline runs automatically on each push</text>

  <text x="272" y="182" font-size="12" fill="#1f2733">1.  Build</text>
  <text x="272" y="205" font-size="12" fill="#1f2733">2.  Test + Coverage (JaCoCo)</text>
  <text x="272" y="228" font-size="12" fill="#1f2733">3.  SonarQube analysis</text>
  <text x="272" y="251" font-size="12" fill="#1f2733">4.  Dependency scan (Trivy)</text>
  <text x="272" y="274" font-size="12" fill="#1f2733">5.  Docker build</text>
  <text x="272" y="297" font-size="12" fill="#1f2733">6.  Image scan (Trivy)</text>
  <text x="272" y="320" font-size="12" fill="#1f2733">7.  Push to ECR</text>
  <text x="272" y="343" font-size="12" fill="#1f2733">8.  Deploy to EKS</text>

  <!-- GATE badges -->
  <g font-size="9" font-weight="bold" fill="#b91c1c">
    <rect x="500" y="194" width="48" height="15" rx="3" fill="#fde2e2" stroke="#b91c1c"/><text x="524" y="205" text-anchor="middle">GATE</text>
    <rect x="500" y="217" width="48" height="15" rx="3" fill="#fde2e2" stroke="#b91c1c"/><text x="524" y="228" text-anchor="middle">GATE</text>
    <rect x="500" y="240" width="48" height="15" rx="3" fill="#fde2e2" stroke="#b91c1c"/><text x="524" y="251" text-anchor="middle">GATE</text>
    <rect x="500" y="286" width="48" height="15" rx="3" fill="#fde2e2" stroke="#b91c1c"/><text x="524" y="297" text-anchor="middle">GATE</text>
  </g>

  <!-- SonarQube + Postgres -->
  <rect x="255" y="382" width="185" height="58" rx="8" fill="#e8f3fb" stroke="#1f7fbf" stroke-width="2"/>
  <text x="347" y="406" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#145e8c">SonarQube</text>
  <text x="347" y="424" text-anchor="middle" font-size="10" fill="#475569">static analysis + quality gate</text>

  <rect x="455" y="382" width="180" height="58" rx="8" fill="#e9eff5" stroke="#336791" stroke-width="2"/>
  <text x="545" y="406" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2a4d6e">PostgreSQL</text>
  <text x="545" y="424" text-anchor="middle" font-size="10" fill="#475569">SonarQube database</text>

  <line x1="347" y1="356" x2="347" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="347" y1="380" x2="347" y2="358" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="356" y="372" font-size="9.5" fill="#475569">analyze</text>
  <line x1="440" y1="411" x2="453" y2="411" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== AWS region ===== -->
  <rect x="700" y="80" width="285" height="480" rx="10" fill="#fff8f2" stroke="#ec7211" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="842" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#b4530f">AWS</text>

  <rect x="720" y="120" width="250" height="58" rx="8" fill="#fff1e6" stroke="#ec7211" stroke-width="2"/>
  <text x="845" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#b4530f">Amazon ECR</text>
  <text x="845" y="162" text-anchor="middle" font-size="10" fill="#475569">private image registry</text>

  <!-- EKS cluster -->
  <rect x="720" y="208" width="250" height="268" rx="10" fill="#eef3fd" stroke="#326ce5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="845" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#2453b3">EKS cluster (Kubernetes)</text>
  <text x="845" y="247" text-anchor="middle" font-size="10" fill="#475569">Deployment: 2+ replicas, self-healing</text>

  <rect x="736" y="258" width="56" height="44" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="764" y="284" text-anchor="middle" font-size="10.5" fill="#2453b3">pod</text>
  <rect x="817" y="258" width="56" height="44" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="845" y="284" text-anchor="middle" font-size="10.5" fill="#2453b3">pod</text>
  <rect x="898" y="258" width="56" height="44" rx="6" fill="#ffffff" stroke="#326ce5" stroke-width="2"/>
  <text x="926" y="284" text-anchor="middle" font-size="10.5" fill="#2453b3">pod</text>

  <rect x="736" y="338" width="218" height="50" rx="8" fill="#e7f0fb" stroke="#146eb4" stroke-width="2"/>
  <text x="845" y="358" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#0f4f86">LoadBalancer</text>
  <text x="845" y="376" text-anchor="middle" font-size="10" fill="#475569">public app URL</text>

  <line x1="845" y1="338" x2="845" y2="304" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Users -->
  <rect x="755" y="500" width="180" height="50" rx="8" fill="#e9f7ef" stroke="#16a34a" stroke-width="2"/>
  <text x="845" y="524" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#15803d">Users / browser</text>
  <text x="845" y="541" text-anchor="middle" font-size="9.5" fill="#475569">open the app</text>

  <line x1="845" y1="500" x2="845" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="852" y="448" font-size="10" fill="#475569">browse app</text>

  <!-- ===== cross-region arrows ===== -->
  <!-- GitHub -> Jenkins (webhook) -->
  <line x1="170" y1="329" x2="253" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="196" y="300" font-size="10" fill="#475569">webhook</text>

  <!-- Jenkins -> ECR (push) -->
  <line x1="635" y1="165" x2="718" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="648" y="150" font-size="10" fill="#475569">push image</text>

  <!-- Jenkins -> EKS (deploy) -->
  <line x1="635" y1="320" x2="718" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="646" y="312" font-size="10" fill="#475569">kubectl deploy</text>

  <!-- EKS -> ECR (pull) -->
  <line x1="926" y1="208" x2="926" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="900" y="199" font-size="10" fill="#475569">pull</text>

  <!-- legend -->
  <rect x="20" y="450" width="170" height="100" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="35" y="472" font-size="11" font-weight="bold" fill="#334155">Legend</text>
  <rect x="35" y="482" width="40" height="14" rx="3" fill="#fde2e2" stroke="#b91c1c"/>
  <text x="80" y="493" font-size="9.5" fill="#475569">GATE: build stops</text>
  <text x="80" y="505" font-size="9.5" fill="#475569">if the check fails</text>
  <text x="35" y="525" font-size="9.5" fill="#475569">A push triggers the whole</text>
  <text x="35" y="538" font-size="9.5" fill="#475569">pipeline automatically.</text>
</svg>
