# Project 5 stack: Jenkins, SonarQube, and a Postgres database for SonarQube.
#
# Jenkins uses the host Docker socket (as in Project 3) so it can build, push,
# scan images, and run the deployed container.
#
# SonarQube needs a host kernel setting before it will start:
#   sudo sysctl -w vm.max_map_count=262144
# and a machine with at least 4 GB RAM (8 GB recommended once builds run too).
#
# Start:  docker compose up -d --build
# Jenkins:    http://localhost:8080
# SonarQube:  http://localhost:9000  (first login admin / admin)

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - cicd

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    networks:
      - cicd

networks:
  cicd:

volumes:
  jenkins-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonar-db-data:
