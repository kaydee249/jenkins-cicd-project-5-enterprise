apiVersion: v1
kind: Service
metadata:
  name: cicd-app
spec:
  # NodePort works on a local cluster (minikube). On EKS we used a
  # LoadBalancer instead, because the cloud can provision a real one.
  type: NodePort
  selector:
    app: cicd-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
